<!DOCTYPE html>
<html data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>

    <!-- tailwind + daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- fonts family -->
    <style>
        * {
            font-family: "Outfit", sans-serif;
        }
    </style>
</head>

<body class="bg-base-200">

    <div class="max-w-7xl mx-auto p-4">
        <h1 class="text-3xl font-bold mb-6">
            Job Application Tracker
        </h1>

        <!-- Dashboard Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">

            <!-- Total -->
            <div class="card bg-base-100 shadow">
                <div class="card-body items-center text-center">
                    <h2 class="text-sm text-gray-500">Total</h2>
                    <p id="totalCount" class="text-3xl font-bold">8</p>
                </div>
            </div>

            <!-- Interview -->
            <div class="card bg-base-100 shadow">
                <div class="card-body items-center text-center">
                    <h2 class="text-sm text-gray-500">Interview</h2>
                    <p id="interviewCount" class="text-3xl font-bold text-success">0</p>
                </div>
            </div>

            <!-- Rejected -->
            <div class="card bg-base-100 shadow">
                <div class="card-body items-center text-center">
                    <h2 class="text-sm text-gray-500">Rejected</h2>
                    <p id="rejectedCount" class="text-3xl font-bold text-error">0</p>
                </div>
            </div>
        </div>

        <!-- Divider Line -->
        <div class="divider w-full my-6"></div>

        <!-- Available Jobs Section -->
        <div class="flex items-start justify-between mb-6">

            <!-- LEFT -->
            <div>
                <h2 class="text-2xl font-bold mb-3">Available Jobs</h2>

                <!-- buttons/tab -->
                <div class="flex gap-3">

                    <button
                        class="px-6 py-2 rounded-xl bg-gradient-to-r from-blue-500 to-blue-400 text-white text-sm font-medium">
                        All
                    </button>

                    <button
                        class="px-6 py-2 rounded-xl bg-gray-100 text-gray-600 text-sm font-medium hover:bg-gray-200">
                        Interview
                    </button>

                    <button
                        class="px-6 py-2 rounded-xl bg-gray-100 text-gray-600 text-sm font-medium hover:bg-gray-200">
                        Rejected
                    </button>
                </div>
            </div>

            <!-- RIGHT COUNT -->
            <div class="text-sm text-gray-500 whitespace-nowrap">
                <span id="jobCount">8 jobs</span>
            </div>
        </div>
    </div>



    </div>

    <script src="script/script.js"></script>
</body>

</html>
